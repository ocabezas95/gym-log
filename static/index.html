<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Log Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="app-title">Gym Log</div>
                <div class="app-subtitle">Workout Tracker</div>
            </div>

            <div class="stats-strip">
                <div class="stat-box">
                    <div class="stat-value" id="stat-count">—</div>
                    <div class="stat-label">Workouts</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-volume">—</div>
                    <div class="stat-label">Total lbs</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-streak">—</div>
                    <div class="stat-label">Day Streak</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-today-vol">—</div>
                    <div class="stat-label">Today's Vol</div>
                </div>
            </div>

            <div class="form-section">
                <h3>Add Workout</h3>
                <form id="workout-form">
                    <div class="form-group">
                        <label for="exercise_id">Exercise</label>
                        <select id="exercise_id" name="exercise_id" required></select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sets">Sets</label>
                            <input type="number" id="sets" name="sets" placeholder="3" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="reps">Reps</label>
                            <input type="number" id="reps" name="reps" placeholder="12" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="weight">Lbs</label>
                            <input type="number" id="weight" name="weight" placeholder="135" step="0.1" min="0"
                                required>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">+ Add Workout</button>
                </form>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">
            <div class="content-header">
                <h2>Workout History</h2>
                <p>All sessions, grouped by date</p>
            </div>
            <div class="workout-list" id="workout-list">
                <div class="empty-state">
                    <span>🏋️</span>
                    <p>No workouts yet. Add your first one!</p>
                </div>
            </div>
        </main>

    </div>

    <!-- EDIT MODAL -->
    <div class="modal-backdrop" id="edit-modal">
        <div class="modal">
            <div class="modal-title">Edit Workout</div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="edit-exercise">Exercise</label>
                    <select id="edit-exercise" required></select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-sets">Sets</label>
                        <input type="number" id="edit-sets" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-reps">Reps</label>
                        <input type="number" id="edit-reps" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-weight">Lbs</label>
                        <input type="number" id="edit-weight" step="0.1" min="0" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="modal-save-btn">Save</button>
                    <button type="button" class="modal-cancel-btn" id="modal-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    <script src="app.js" defer></script>
</body>

</html>
